name: Weekly Data Refresh

on:
  # Every Monday at 15:00 UTC (8:00 AM PT / 7:00 AM PST).
  schedule:
    - cron: '0 15 * * 1'
  # Manual trigger for ad-hoc runs
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PR, print report only)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run data refresh scraper
        id: scrape
        run: |
          set +e
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/refresh-data.mjs --dry-run
            EXIT=$?
          else
            node scripts/refresh-data.mjs
            EXIT=$?
          fi
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          # Treat exit 1 (changes detected) as a successful run with changes.
          # Exit 2 = hard framework error → fail the job.
          if [ "$EXIT" = "2" ]; then exit 2; fi
          exit 0

      - name: Print report summary
        if: always()
        run: |
          if [ -f scripts/data-refresh-report.md ]; then
            echo '### Data Refresh Report' >> "$GITHUB_STEP_SUMMARY"
            cat scripts/data-refresh-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open PR if changes detected
        if: steps.scrape.outputs.exit_code == '1' && github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(data): weekly refresh — scraped updates detected'
          title: '🔄 Weekly Data Refresh — Review scraped changes'
          body-path: scripts/data-refresh-report.md
          branch: chore/data-refresh-${{ github.run_id }}
          delete-branch: true
          labels: |
            data-refresh
            auto-generated
          add-paths: |
            scripts/data-refresh-report.md
